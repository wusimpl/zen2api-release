name: "✨ 功能建议"
description: "提交对 zen2api 发布版的功能建议"
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议！请尽量说明使用场景和预期效果。

  - type: dropdown
    id: type
    attributes:
      label: 建议类型
      options:
        - 新功能
        - 功能优化
        - GUI 改进
        - 发布流程改进
        - 文档改进
        - 其他
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: 相关组件
      options:
        - zen2api 主服务
        - GUI
        - anyrouter sidecar
        - cursor2api sidecar
        - grok2api sidecar
        - 发布仓库
        - 其他
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 请清晰描述你期望新增或优化的内容
      placeholder: "描述你希望添加或改进的功能..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 请描述这个建议要解决什么问题，会在什么场景下使用
      placeholder: "例如：当我使用 XX 时，我希望能够..."
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你是否考虑过其他方案？
      placeholder: "描述你考虑过的其他方案..."
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 确认事项
      options:
        - label: 我已经检查过是否有相同的功能请求
          required: true
